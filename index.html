        :root {
            --neon-cyan: #00f0ff;
            --neon-pink: #ff00aa;
            --neon-purple: #8a00ff;
        }
        
        * {
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .neon-text {
            text-shadow:

                0 0 40px var(--neon-pink),

            animation: neon-flicker 1.2s infinite alternate;

        @keyframes neon-flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.92; }
        }

        /* Epic Animated Background */
        .hero-bg {
            background: radial-gradient(circle at center, #0a0a0a 0%, #000000 75%);
            position: relative;
            overflow: hidden;
            min-height: 100vh;
        }

        .hero-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(0,240,255,0.12) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,240,255,0.12) 1px, transparent 1px),
                radial-gradient(circle, rgba(255,0,170,0.08) 2px, transparent 2px);
            background-size: 80px 80px, 80px 80px, 40px 40px;
            animation: grid-move 18s linear infinite;
            z-index: 1;
            opacity: 0.45;
        }

        .hero-bg .glow-layer {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 40%, rgba(138,0,255,0.15) 0%, transparent 60%),
                        radial-gradient(circle at 70% 70%, rgba(0,240,255,0.15) 0%, transparent 60%);
            animation: glow-orbit 40s linear infinite;
            z-index: 1;
        }

        .hero-bg .scanlines {
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(255,255,255,0.03) 3px, rgba(255,255,255,0.03) 4px);
            z-index: 3;
            animation: scan-move 8s linear infinite;
        }

        @keyframes grid-move { 0% { background-position: 0 0; } 100% { background-position: 160px 160px; } }
        @keyframes glow-orbit { 0% { transform: rotate(0deg) scale(1); } 100% { transform: rotate(360deg) scale(1.05); } }
        @keyframes scan-move { 0% { background-position: 0 0; } 100% { background-position: 0 100px; } }

        .glow-button {
            position: relative;
            box-shadow: 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-cyan), 0 0 60px var(--neon-pink);
            overflow: hidden;
        }
        
        .glow-button::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 40%; height: 300%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            transform: skewX(-25deg);
            animation: shine 3.5s linear infinite;
        }
        
        @keyframes shine { 100% { transform: translateX(350%); } }
        
        .download-icon { animation: float 2.8s ease-in-out infinite; }

        /* Mobile Friendly Improvements */
        @media (max-width: 640px) {
            .hero-bg {

            }
            h1 {
                font-size: 2.8rem;
                line-height: 1.1;
            }
        }
    </style>
